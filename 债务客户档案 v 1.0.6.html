<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>债务客户档案 v 1.0.6</title>
    <style>
      :root {
        color-scheme: light;
        --teal: #08766f;
        --teal-soft: #edf8f6;
        --ink: #151f1d;
        --muted: #6d7774;
        --line: #e0e5e2;
        --paper: #fff;
        --danger: #e60012;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #f7f8f7;
        color: var(--ink);
        font-family:
          ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      .app {
        width: min(100%, 430px);
        min-height: 100dvh;
        margin: 0 auto;
        padding: 0 15px 14px;
        background: var(--paper);
      }

      .top-bar {
        position: sticky;
        top: 0;
        z-index: 20;
        display: grid;
        grid-template-columns: 64px 1fr 64px;
        align-items: center;
        min-height: 58px;
        margin: 0 -15px 18px;
        padding: 0 15px;
        background: rgba(255, 255, 255, 0.96);
        backdrop-filter: blur(12px);
      }

      .top-title {
        text-align: center;
        font-size: 18px;
        font-weight: 900;
      }

      .top-action {
        min-height: 32px;
        border-radius: 8px;
        background: transparent;
        color: var(--teal);
        font-size: 13px;
        font-weight: 820;
      }

      .top-action.left {
        text-align: left;
        letter-spacing: 0;
      }

      .top-action.right {
        padding-right: 16px;
        text-align: right;
      }

      .screen {
        display: none;
      }

      .screen.active {
        display: block;
      }

      .search-box,
      .box,
      .table-box {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }

      .search-box {
        margin-bottom: 12px;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 0;
        background: transparent;
        color: var(--ink);
        outline: none;
      }

      input,
      select {
        min-height: 40px;
        padding: 0 10px;
        font-size: 12.5px;
        font-weight: 480;
      }

      textarea {
        min-height: 106px;
        padding: 10px;
        resize: none;
        font-size: 12.5px;
        line-height: 1.5;
      }

      input::placeholder,
      textarea::placeholder {
        color: #8c9693;
      }

      .client-list,
      .detail-block {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .client-line {
        position: relative;
        overflow: hidden;
        background: #fff;
        touch-action: pan-y;
      }

      .client-card {
        position: relative;
        z-index: 1;
        width: 100%;
        min-height: 56px;
        padding: 10px 10px 10px 24px;
        border-bottom: 1px solid var(--line);
        background: #fff;
        text-align: left;
        transition: transform 0.2s ease;
      }

      .client-line:last-child .client-card {
        border-bottom: 0;
      }

      .client-line.open .client-card {
        transform: translateX(-144px);
      }

      .client-follow,
      .client-delete {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 72px;
        color: #fff;
        font-size: 14px;
        font-weight: 820;
        opacity: 0;
        transition: opacity 0.12s ease;
      }

      .client-follow {
        right: 72px;
        background: var(--teal);
      }

      .client-delete {
        right: 0;
        background: var(--danger);
      }

      .client-line.open .client-follow,
      .client-line.open .client-delete {
        opacity: 1;
      }

      .client-card .client-main {
        display: grid;
        grid-template-columns: 124px 1fr;
        column-gap: 14px;
        align-items: center;
        margin-bottom: 5px;
      }

      .client-card .client-main strong {
        min-width: 0;
        color: var(--ink);
        font-size: 13px;
        overflow-wrap: anywhere;
      }

      .client-card .client-time {
        color: var(--muted);
        font-size: 10px;
        font-weight: 520;
        white-space: nowrap;
      }
      .client-card span,
      .empty {
        display: block;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .client-card .due-alert,
      .due-alert {
        color: var(--danger);
        font-weight: 760;
      }

      .client-card .due-alert {
        margin-top: 4px;
      }

      .client-filter {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 0 2px 10px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 720;
      }

      .client-filter button {
        position: relative;
        padding: 0 0 5px;
        background: transparent;
        color: var(--muted);
        font-size: 12px;
        font-weight: 720;
      }

      .client-filter button.active {
        color: var(--teal);
      }

      .client-filter button.active::after {
        content: "";
        position: absolute;
        right: 0;
        bottom: 0;
        left: 0;
        height: 2px;
        border-radius: 999px;
        background: var(--teal);
      }

      .client-filter .filter-separator {
        color: #b8bfbc;
      }

      .client-filter .filter-alert {
        color: var(--danger);
      }

      .empty {
        padding: 14px 10px;
      }

      .data-tools {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 12px;
        margin-top: 10px;
        padding-right: 16px;
      }

      .data-tools button {
        min-height: 26px;
        padding: 0;
        background: transparent;
        color: var(--teal);
        font-size: 12px;
        font-weight: 820;
      }

      .data-separator {
        width: 1px;
        height: 12px;
        background: var(--line);
      }

      .app-signature {
        margin-top: 18px;
        color: #a8b0ad;
        font-size: 11px;
        font-weight: 520;
        text-align: center;
      }

      .backup-input {
        display: none;
      }

      .step {
        margin-bottom: 18px;
      }

      .detail-block + .step {
        margin-top: 16px;
      }

      .step-title {
        display: flex;
        gap: 9px;
        align-items: center;
        margin-bottom: 9px;
        font-size: 18px;
        font-weight: 900;
      }

      .follow-list {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }

      .follow-line {
        position: relative;
        overflow: hidden;
        background: #fff;
        touch-action: pan-y;
      }

      .follow-item {
        position: relative;
        z-index: 1;
        padding: 10px;
        border-bottom: 1px solid var(--line);
        background: #fff;
        transition: transform 0.2s ease;
      }

      .follow-line:last-child .follow-item {
        border-bottom: 0;
      }

      .follow-line.open .follow-item {
        transform: translateX(-72px);
      }

      .follow-delete {
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        width: 72px;
        background: var(--danger);
        color: #fff;
        font-size: 14px;
        font-weight: 820;
        opacity: 0;
        transition: opacity 0.12s ease;
      }

      .follow-line.open .follow-delete {
        opacity: 1;
      }

      .follow-meta {
        display: block;
        margin-bottom: 4px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 620;
        line-height: 1.4;
      }

      .follow-content {
        color: var(--ink);
        font-size: 12.5px;
        font-weight: 520;
        line-height: 1.5;
        overflow-wrap: anywhere;
      }

      .step-add {
        margin-left: auto;
        margin-right: 16px;
        min-height: 28px;
        padding: 0 2px;
        background: transparent;
        color: var(--teal);
        font-size: 13px;
        font-weight: 820;
        line-height: 1;
      }

      .num {
        display: inline-grid;
        width: 23px;
        height: 23px;
        place-items: center;
        border-radius: 999px;
        background: var(--teal);
        color: #fff;
        font-size: 15px;
        font-weight: 900;
      }

      .info-row,
      .detail-row {
        display: grid;
        grid-template-columns: 96px 1fr;
        min-height: 40px;
        border-bottom: 1px solid var(--line);
      }

      .info-row:last-child,
      .detail-row:last-child {
        border-bottom: 0;
      }

      input.is-error::placeholder {
        color: var(--danger);
      }

      input.is-error {
        animation: errorBlink 0.72s ease-in-out 3;
      }

      @keyframes errorBlink {
        0%,
        100% {
          opacity: 1;
        }

        50% {
          opacity: 0.35;
        }
      }

      .label-cell,
      .value-cell,
      .detail-row span,
      .detail-row strong {
        display: flex;
        align-items: center;
        min-width: 0;
        padding: 0 10px;
        font-size: 12px;
        font-weight: 480;
      }

      .label-cell,
      .detail-row span {
        border-right: 1px solid var(--line);
        color: var(--muted);
      }

      .info-row .label-cell {
        border-right: 0;
      }

      .value-cell {
        gap: 8px;
      }

      .segmented {
        display: flex;
        gap: 10px;
      }

      .segmented button {
        min-width: 60px;
        min-height: 25px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #fff;
        color: var(--ink);
        font-size: 12px;
        font-weight: 480;
      }

      .segmented button.active {
        border-color: var(--teal);
        background: var(--teal-soft);
        box-shadow: inset 0 0 0 1px rgba(8, 118, 111, 0.35);
        color: var(--teal);
      }

      .debt-head,
      .debt-row {
        display: grid;
        grid-template-columns: 0.9fr 1.2fr 0.98fr 0.76fr 1.16fr;
        align-items: center;
      }

      .debt-head {
        min-height: 30px;
        border-bottom: 1px solid var(--line);
        background: #f4f8f6;
      }

      .debt-head span,
      .debt-row > * {
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 0;
        min-height: 40px;
        border-right: 1px solid var(--line);
        background: #fff;
        font-size: 12.5px;
        font-weight: 480;
      }

      .debt-head span {
        justify-content: center;
        min-height: 30px;
        background: #f4f8f6;
        color: #6d7774;
        font-size: 11px;
        font-weight: 620;
      }

      .debt-head span:last-child,
      .debt-row > *:last-child {
        border-right: 0;
      }

      .debt-line {
        position: relative;
        overflow: hidden;
        background: #fff;
        touch-action: pan-y;
      }

      .debt-row {
        position: relative;
        z-index: 1;
        min-height: 40px;
        border-bottom: 1px solid var(--line);
        background: #fff;
        transition: transform 0.2s ease;
      }

      .debt-line.open .debt-row {
        transform: translateX(-72px);
      }

      .debt-delete {
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        width: 72px;
        background: var(--danger);
        color: #fff;
        font-size: 14px;
        font-weight: 820;
        opacity: 0;
        transition: opacity 0.12s ease;
      }

      .debt-line.open .debt-delete {
        opacity: 1;
      }

      .select-cell select {
        appearance: none;
        border-radius: 6px;
        background: var(--teal-soft);
        color: var(--muted);
        text-align: center;
      }

      .select-cell.is-layered {
        position: relative;
      }

      .select-cell.is-layered select {
        position: absolute;
        inset: 0;
        z-index: 2;
        opacity: 0;
      }

      .select-display {
        width: 100%;
        min-height: 40px;
        border-radius: 6px;
        background: var(--teal-soft);
        color: var(--muted);
        font-size: 12.5px;
        font-weight: 480;
        pointer-events: none;
        text-align: center;
      }

      .select-cell select[data-field="status"] {
        color: var(--ink);
      }

      .select-cell select[data-field="status"] option {
        color: var(--ink);
      }

      .select-cell select.is-overdue,
      .select-cell select option.is-overdue,
      .debt-row .is-overdue {
        color: var(--danger);
      }

      .select-cell select.is-reminder,
      .select-cell select option.is-reminder,
      .debt-row .is-reminder {
        color: #d69500;
      }

      .select-cell select.is-settled,
      .select-cell select option.is-settled,
      .debt-row .is-settled {
        color: var(--teal);
      }

      .date-cell {
        position: relative;
      }

      .date-display {
        width: 100%;
        min-height: 40px;
        border-radius: 6px;
        background: var(--teal-soft);
        color: var(--muted);
        font-size: 12.5px;
        font-weight: 480;
        pointer-events: none;
        text-align: center;
      }

      .date-cell input {
        position: absolute;
        inset: 0;
        z-index: 2;
        opacity: 0;
      }

      .date-cell input:focus + .date-display {
        box-shadow: inset 0 0 0 1px rgba(8, 118, 111, 0.35);
      }

      .date-cell input::-webkit-calendar-picker-indicator {
        display: none;
      }

      .date-cell input.fallback-date-input {
        position: static;
        opacity: 1;
        border-radius: 6px;
        background: var(--teal-soft);
        color: var(--muted);
        text-align: center;
      }

      .debt-row input {
        text-align: center;
      }

      .debt-row input.is-error {
        color: var(--ink);
      }

      .concern-box {
        padding: 0;
      }

      .textarea-wrap {
        position: relative;
      }

      .concern-box textarea {
        padding: 12px 12px 28px;
      }

      .counter {
        position: absolute;
        right: 13px;
        bottom: 8px;
        color: #6d7774;
        font-size: 13px;
      }

      .bottom-action {
        position: sticky;
        bottom: 0;
        z-index: 20;
        margin-top: 14px;
        padding: 10px 0 0;
        background: rgba(255, 255, 255, 0.96);
        backdrop-filter: blur(12px);
      }

      .primary-btn {
        position: relative;
        overflow: hidden;
        width: 100%;
        min-height: 42px;
        border: 1px solid rgba(8, 118, 111, 0.5);
        border-radius: 10px;
        background: #fff;
        color: var(--teal);
        font-size: 14px;
        font-weight: 820;
        transition: background 0.12s ease, border-color 0.12s ease, box-shadow 0.12s ease, transform 0.12s ease;
      }

      .primary-btn:active,
      .top-action:active,
      .client-card:active {
        transform: scale(0.98);
      }

      .primary-btn.is-tapped {
        animation: buttonTap 0.34s ease;
      }

      @keyframes buttonTap {
        0% {
          background: #fff;
          box-shadow: none;
          transform: scale(1);
        }

        38% {
          border-color: var(--teal);
          background: var(--teal-soft);
          box-shadow: 0 0 0 4px rgba(8, 118, 111, 0.1);
          transform: scale(0.985);
        }

        100% {
          background: #fff;
          box-shadow: none;
          transform: scale(1);
        }
      }

      .plan-card {
        margin-bottom: 12px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfdfc;
        font-size: 13px;
        line-height: 1.7;
      }

      .plan-card h3 {
        margin-bottom: 8px;
        font-size: 15px;
      }

      .plan-card ul,
      .plan-card ol {
        margin: 0;
        padding-left: 20px;
      }

      .detail-plan {
        display: none;
        margin-top: 14px;
      }

      .detail-plan.active {
        display: block;
      }

      .plan-tools {
        display: flex;
        justify-content: flex-end;
        gap: 16px;
        margin: 0 16px 8px 4px;
      }

      .plan-tools button {
        padding: 0;
        background: transparent;
        color: var(--teal);
        font-size: 13px;
        font-weight: 820;
      }

      @media (max-width: 380px) {
        .app {
          padding-right: 12px;
          padding-left: 12px;
        }

        .top-bar {
          margin-right: -12px;
          margin-left: -12px;
          padding-right: 12px;
          padding-left: 12px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="top-bar">
        <button class="top-action left" id="leftAction" type="button"></button>
        <h1 class="top-title" id="pageTitle">客户档案</h1>
        <button class="top-action right" id="rightAction" type="button">新建</button>
      </header>

      <section class="screen active" id="homeScreen">
        <div class="search-box">
          <input id="clientSearch" type="search" placeholder="输入姓名或手机号查询" />
        </div>
        <div class="client-filter" id="clientFilter">
          <button class="active" type="button" data-filter="all">全部客户</button>
          <span class="filter-separator">·</span>
          <button type="button" data-filter="alert">有提醒 <span class="filter-alert" id="alertClientCount">0</span></button>
        </div>
        <div class="client-list" id="clientList"></div>
        <div class="data-tools">
          <button id="importBtn" type="button">导入</button>
          <span class="data-separator" aria-hidden="true"></span>
          <button id="exportBtn" type="button">导出</button>
        </div>
        <input class="backup-input" id="backupFileInput" type="file" accept="application/json,.json" />
      </section>

      <section class="screen" id="formScreen">
        <form id="archiveForm">
          <section class="step">
            <h2 class="step-title"><span class="num">1</span><span>客户信息</span></h2>
            <div class="box">
              <label class="info-row">
                <span class="label-cell">姓名：</span>
                <span class="value-cell"><input name="name" type="text" placeholder="请输入姓名" /></span>
              </label>
              <label class="info-row">
                <span class="label-cell">联系电话：</span>
                <span class="value-cell"><input name="phone" type="tel" inputmode="tel" placeholder="请输入手机号" /></span>
              </label>
              <label class="info-row">
                <span class="label-cell">月收入：</span>
                <span class="value-cell"><input name="monthlyIncome" type="text" inputmode="decimal" placeholder="请输入金额" /></span>
              </label>
              <div class="info-row">
                <span class="label-cell">是否有房贷：</span>
                <span class="value-cell">
                  <span class="segmented" id="mortgageGroup">
                    <button class="active" type="button" data-value="否">否</button>
                    <button type="button" data-value="是">是</button>
                  </span>
                  <input name="hasMortgage" type="hidden" value="否" />
                </span>
              </div>
            </div>
          </section>

          <section class="step">
            <h2 class="step-title"><span class="num">2</span><span>债务明细</span><button class="step-add" id="addDebtBtn" type="button">+ 添加</button></h2>
            <div class="table-box">
              <div class="debt-head">
                <span>类型</span>
                <span>机构</span>
                <span>金额(万)</span>
                <span>状态</span>
                <span>到期日期</span>
              </div>
              <div id="debtRows"></div>
            </div>
          </section>

          <section class="step">
            <h2 class="step-title"><span class="num">3</span><span>其他信息</span></h2>
            <div class="box concern-box">
              <div class="textarea-wrap">
                <textarea name="biggestConcern" maxlength="200" placeholder="请输入客户最担心的问题或影响"></textarea>
                <span class="counter" id="concernCounter">0/200</span>
              </div>
            </div>
          </section>
        </form>
        <div class="bottom-action">
          <button class="primary-btn" id="saveBtn" type="button">保存档案</button>
        </div>
      </section>

      <section class="screen" id="detailScreen">
        <div class="detail-block" id="detailSummary"></div>
        <section class="step">
          <h2 class="step-title"><span>债务清单</span></h2>
          <div class="table-box" id="detailDebtList"></div>
        </section>
        <section class="step">
          <h2 class="step-title"><span>跟进记录</span><button class="step-add" id="addFollowBtn" type="button">+ 添加</button></h2>
          <div class="follow-list" id="detailFollowList"></div>
        </section>
        <div class="bottom-action">
          <button class="primary-btn" id="generateBtn" type="button">展开方案</button>
        </div>
        <div class="detail-plan" id="detailPlanSection">
          <div class="plan-tools">
            <button id="copyPlanBtn" type="button">复制</button>
          </div>
          <article id="planOutput"></article>
        </div>
      </section>

      <section class="screen" id="followScreen">
        <form id="followForm">
          <section class="step">
            <h2 class="step-title"><span>跟进信息</span></h2>
            <div class="box">
              <label class="info-row">
                <span class="label-cell">跟进时间：</span>
                <span class="value-cell"><input name="followTime" type="datetime-local" /></span>
              </label>
              <div class="info-row">
                <span class="label-cell">跟进方式：</span>
                <span class="value-cell">
                  <span class="segmented" id="followMethodGroup">
                    <button class="active" type="button" data-value="电话">电话</button>
                    <button type="button" data-value="微信">微信</button>
                    <button type="button" data-value="面谈">面谈</button>
                    <button type="button" data-value="其他">其他</button>
                  </span>
                  <input name="followMethod" type="hidden" value="电话" />
                </span>
              </div>
              <label class="info-row">
                <span class="label-cell">下次跟进：</span>
                <span class="value-cell"><input name="nextFollowDate" type="date" /></span>
              </label>
            </div>
          </section>
          <section class="step">
            <h2 class="step-title"><span>跟进内容</span></h2>
            <div class="box concern-box">
              <div class="textarea-wrap">
                <textarea name="followContent" maxlength="200" placeholder="记录沟通结果、客户反馈或下一步安排"></textarea>
                <span class="counter" id="followCounter">0/200</span>
              </div>
            </div>
          </section>
        </form>
      </section>

      <p class="app-signature">轻债助手 · v 1.0.6</p>
    </main>

    <script>
      const storageKey = "debtCustomerArchiveV150";
      const oldKeys = [
        "debtCustomerArchiveV130",
        "debtCustomerArchiveV120",
        "debtCustomerArchiveV110",
        "debtOptimizationClientsSingleFile"
      ];

      const screens = {
        home: document.querySelector("#homeScreen"),
        form: document.querySelector("#formScreen"),
        detail: document.querySelector("#detailScreen"),
        follow: document.querySelector("#followScreen")
      };
      const pageTitle = document.querySelector("#pageTitle");
      const leftAction = document.querySelector("#leftAction");
      const rightAction = document.querySelector("#rightAction");
      const clientSearch = document.querySelector("#clientSearch");
      const clientFilter = document.querySelector("#clientFilter");
      const alertClientCount = document.querySelector("#alertClientCount");
      const clientList = document.querySelector("#clientList");
      const importBtn = document.querySelector("#importBtn");
      const exportBtn = document.querySelector("#exportBtn");
      const backupFileInput = document.querySelector("#backupFileInput");
      const archiveForm = document.querySelector("#archiveForm");
      const mortgageGroup = document.querySelector("#mortgageGroup");
      const debtRows = document.querySelector("#debtRows");
      const concernField = archiveForm.elements.biggestConcern;
      const concernCounter = document.querySelector("#concernCounter");
      const saveBtn = document.querySelector("#saveBtn");
      const generateBtn = document.querySelector("#generateBtn");
      const copyPlanBtn = document.querySelector("#copyPlanBtn");
      const detailSummary = document.querySelector("#detailSummary");
      const detailDebtList = document.querySelector("#detailDebtList");
      const detailFollowList = document.querySelector("#detailFollowList");
      const addFollowBtn = document.querySelector("#addFollowBtn");
      const detailPlanSection = document.querySelector("#detailPlanSection");
      const planOutput = document.querySelector("#planOutput");
      const followForm = document.querySelector("#followForm");
      const followMethodGroup = document.querySelector("#followMethodGroup");
      const followContentField = followForm.elements.followContent;
      const followCounter = document.querySelector("#followCounter");

      let currentScreen = "home";
      let selectedClientId = null;
      let editingClientId = null;
      let clientFilterMode = "all";
      let debts = [];
      let lastPlan = "";
      const debtStatusOptions = ["正常", "提醒", "逾期", "催收", "协商", "结清"];

      function uid(prefix) {
        return `${prefix}-${Date.now()}-${Math.random().toString(16).slice(2)}`;
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function parseMoney(value) {
        const raw = String(value || "").trim().replace(/,/g, "");
        if (!raw) return 0;
        const number = Number(raw.replace(/[^\d.]/g, ""));
        if (!Number.isFinite(number)) return 0;
        return raw.includes("万") ? number * 10000 : number;
      }

      function formatMoney(value) {
        if (!Number.isFinite(value)) return "0";
        if (Math.abs(value) >= 10000) return `${formatWanAmount(value / 10000)}万`;
        return Math.round(value).toLocaleString("zh-CN");
      }

      function parseDebtAmount(value) {
        const raw = String(value || "").trim().replace(/,/g, "");
        if (!raw) return 0;
        if (raw.includes("万")) return parseMoney(raw);
        const number = Number(raw.replace(/[^\d.]/g, ""));
        if (!Number.isFinite(number)) return 0;
        return number >= 10000 ? number : number * 10000;
      }

      function formatDateTime(value) {
        const date = new Date(value);
        if (!Number.isFinite(date.getTime())) return "未记录";
        const pad = (number) => String(number).padStart(2, "0");
        return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
      }

      function formatFollowTime(value) {
        const date = new Date(value);
        if (!Number.isFinite(date.getTime())) return "未记录";
        const pad = (number) => String(number).padStart(2, "0");
        return `${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
      }

      function currentDateTimeInputValue() {
        const date = new Date();
        const pad = (number) => String(number).padStart(2, "0");
        return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
      }

      function normalizeDebtStatus(debt = {}) {
        const value = debt.status || debt.overdue || "";
        if (debtStatusOptions.includes(value)) return value;
        if (value === "已逾期") return "逾期";
        return statusFromDueDate(debt.dueDate);
      }

      function statusFromDueDate(dueDate) {
        const days = daysUntilDue(dueDate);
        if (days !== null && days < 0) return "逾期";
        if (days !== null && days <= 30) return "提醒";
        return "正常";
      }

      function isRiskStatus(status) {
        return status === "逾期" || status === "催收";
      }

      function isReminderStatus(status) {
        return status === "提醒";
      }

      function isSettledStatus(status) {
        return status === "协商" || status === "结清";
      }

      function statusClass(status) {
        if (isRiskStatus(status)) return "is-overdue";
        if (isReminderStatus(status)) return "is-reminder";
        if (isSettledStatus(status)) return "is-settled";
        return "";
      }

      function dueDateClass(debt) {
        if (normalizeDebtStatus(debt) === "结清") return "";
        const days = daysUntilDue(debt?.dueDate);
        if (days === null) return "";
        if (days < 0) return "due-alert";
        if (days <= 30) return "is-reminder";
        return "";
      }

      function displayDueDate(value) {
        return String(value || "").trim() || "未填写";
      }

      function parseDueDate(value) {
        const date = new Date(`${value}T00:00:00`);
        return Number.isFinite(date.getTime()) ? date : null;
      }

      function daysUntilDue(value) {
        const date = parseDueDate(value);
        if (!date) return null;
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        return Math.ceil((date - today) / 86400000);
      }

      function isDueAlert(debt) {
        if (normalizeDebtStatus(debt) === "结清") return false;
        const days = daysUntilDue(debt?.dueDate);
        return days !== null && days <= 30;
      }

      function dueAlertText(debt) {
        const days = daysUntilDue(debt?.dueDate);
        if (days === null || days > 30) return "";
        const creditor = debt.creditor || "未填写机构";
        if (days < 0) return `${creditor} 已过期${Math.abs(days)}天`;
        if (days === 0) return `${creditor} 今天到期`;
        return `${creditor} ${days}天后到期`;
      }

      function clientDueAlert(client) {
        const alerts = (client.debts || [])
          .filter(isDueAlert)
          .sort((a, b) => (daysUntilDue(a.dueDate) ?? 9999) - (daysUntilDue(b.dueDate) ?? 9999));
        if (alerts.length === 1) return dueAlertText(alerts[0]);
        if (alerts.length > 1) return `有${alerts.length}笔债务逾期/到期提醒`;
        return "";
      }

      function hasDueAlert(client) {
        return (client.debts || []).some(isDueAlert);
      }

      function formatDebtAmountInput(value) {
        const raw = String(value || "").trim().replace(/,/g, "");
        if (!raw) return "";
        const normalized = raw.includes("万") ? raw.replace("万", "") : raw;
        const numberText = normalized.replace(/[^\d.]/g, "");
        const match = numberText.match(/^(\d+)(?:\.(\d*))?/);
        if (!match) return "";
        const integerPart = String(Number(match[1]));
        const decimalPart = match[2] === undefined ? "" : match[2].slice(0, 2);
        return decimalPart ? `${integerPart}.${decimalPart}` : integerPart;
      }

      function formatWanAmount(value) {
        return Number(value.toFixed(2)).toString();
      }

      function loadClients() {
        try {
          return JSON.parse(localStorage.getItem(storageKey) || "[]");
        } catch {
          return [];
        }
      }

      function saveClients(clients) {
        localStorage.setItem(storageKey, JSON.stringify(clients));
      }

      function normalizeImportedClient(client) {
        const now = new Date().toISOString();
        return {
          id: client.id || uid("client"),
          name: String(client.name || "").trim(),
          phone: String(client.phone || "").trim(),
          monthlyIncome: String(client.monthlyIncome || "").trim(),
          hasMortgage: client.hasMortgage === "是" ? "是" : "否",
          biggestConcern: String(client.biggestConcern || "").trim(),
          debts: (Array.isArray(client.debts) ? client.debts : []).map((debt) => ({
            id: debt.id || uid("debt"),
            type: normalizeDebtType(debt.type),
            creditor: String(debt.creditor || "").trim(),
            amount: String(debt.amount || "").trim(),
            status: normalizeDebtStatus(debt),
            dueDate: String(debt.dueDate || "").trim()
          })),
          followUps: (Array.isArray(client.followUps) ? client.followUps : []).map((item) => ({
            id: item.id || uid("follow"),
            time: item.time || item.createdAt || now,
            method: item.method || "电话",
            nextDate: String(item.nextDate || "").trim(),
            content: String(item.content || "").trim(),
            createdAt: item.createdAt || now
          })),
          createdAt: client.createdAt || now,
          updatedAt: client.updatedAt || now,
          plan: client.plan || ""
        };
      }

      function readBackupClients(data) {
        const clients = Array.isArray(data) ? data : data?.clients;
        if (!Array.isArray(clients)) return null;
        return clients.map(normalizeImportedClient);
      }

      function migrateClients() {
        if (localStorage.getItem(storageKey)) return;
        for (const key of oldKeys) {
          let clients = [];
          try {
            clients = JSON.parse(localStorage.getItem(key) || "[]");
          } catch {
            clients = [];
          }
          if (!clients.length) continue;
          saveClients(
            clients.map((client) => ({
              ...client,
              id: client.id || uid("client"),
              debts: (client.debts || []).map((debt) => ({
                ...debt,
                id: debt.id || uid("debt"),
                type: normalizeDebtType(debt.type),
                status: normalizeDebtStatus(debt),
                dueDate: String(debt.dueDate || "").trim()
              }))
            }))
          );
          return;
        }
      }

      function totalDebt(client) {
        return (client.debts || []).reduce((sum, debt) => sum + parseDebtAmount(debt.amount), 0);
      }

      function clearValidationErrors() {
        archiveForm.querySelectorAll(".is-error").forEach((item) => item.classList.remove("is-error"));
      }

      function markValidationError(target) {
        target?.classList.remove("is-error");
        if (target) void target.offsetWidth;
        target?.classList.add("is-error");
        target?.scrollIntoView({ block: "center", behavior: "smooth" });
      }

      function tapButton(button) {
        button.classList.remove("is-tapped");
        void button.offsetWidth;
        button.classList.add("is-tapped");
      }

      function showScreen(name) {
        currentScreen = name;
        Object.entries(screens).forEach(([screenName, screen]) => {
          screen.classList.toggle("active", screenName === name);
        });

        leftAction.textContent = "";
        rightAction.textContent = "";
        leftAction.disabled = true;
        rightAction.disabled = true;

        if (name === "home") {
          pageTitle.textContent = "客户档案";
          rightAction.textContent = "+ 添加";
          rightAction.disabled = false;
          renderClientList();
        }

        if (name === "form") {
          pageTitle.textContent = editingClientId ? "编辑客户" : "新建客户";
          leftAction.textContent = "‹ 返回";
          leftAction.disabled = false;
        }

        if (name === "detail") {
          pageTitle.textContent = "客户详情";
          leftAction.textContent = "‹ 返回";
          rightAction.textContent = "编辑";
          leftAction.disabled = false;
          rightAction.disabled = false;
          renderDetail();
        }

        if (name === "follow") {
          pageTitle.textContent = "添加跟进";
          leftAction.textContent = "‹ 返回";
          rightAction.textContent = "保存";
          leftAction.disabled = false;
          rightAction.disabled = false;
        }

      }

      function getClient(clientId) {
        return loadClients().find((client) => client.id === clientId);
      }

      function startNewClient() {
        editingClientId = null;
        selectedClientId = null;
        archiveForm.reset();
        mortgageGroup.querySelectorAll("button").forEach((button) => button.classList.toggle("active", button.dataset.value === "否"));
        archiveForm.elements.hasMortgage.value = "否";
        debts = [];
        addDebt();
        updateConcernCount();
        clearValidationErrors();
        showScreen("form");
      }

      function editClient(clientId) {
        const client = getClient(clientId);
        if (!client) return;
        editingClientId = client.id;
        selectedClientId = client.id;
        archiveForm.elements.name.value = client.name || "";
        archiveForm.elements.phone.value = client.phone || "";
        archiveForm.elements.monthlyIncome.value = client.monthlyIncome || "";
        archiveForm.elements.hasMortgage.value = client.hasMortgage || "否";
        archiveForm.elements.biggestConcern.value = client.biggestConcern || "";
        mortgageGroup.querySelectorAll("button").forEach((button) => {
          button.classList.toggle("active", button.dataset.value === archiveForm.elements.hasMortgage.value);
        });
        debts = (client.debts || []).map((debt) => ({
          ...debt,
          id: debt.id || uid("debt"),
          status: normalizeDebtStatus(debt),
          dueDate: debt.dueDate || ""
        }));
        if (!debts.length) addDebt();
        else renderDebts();
        updateConcernCount();
        clearValidationErrors();
        showScreen("form");
      }

      function addDebt(data = {}) {
        debts.push({
          id: data.id || uid("debt"),
          type: normalizeDebtType(data.type || "网贷"),
          creditor: data.creditor || "",
          amount: data.amount || "",
          status: normalizeDebtStatus(data),
          dueDate: data.dueDate || ""
        });
        renderDebts();
      }

      function normalizeDebtType(value) {
        return ["网贷", "信用卡", "银行贷款"].includes(value) ? value : "网贷";
      }

      function updateDebt(id, field, value) {
        debts = debts.map((debt) => (debt.id === id ? { ...debt, [field]: value } : debt));
      }

      function removeDebt(id) {
        debts = debts.filter((debt) => debt.id !== id);
        if (!debts.length) addDebt();
        else renderDebts();
      }

      function renderDebts() {
        debtRows.innerHTML = debts
          .map(
            (debt) => `
              <div class="debt-line" data-id="${debt.id}">
                <div class="debt-row" data-id="${debt.id}">
                  <span class="select-cell is-layered">
                    <select data-field="type">
                      ${["网贷", "信用卡", "银行贷款"].map((item) => `<option value="${item}" ${debt.type === item ? "selected" : ""}>${item}</option>`).join("")}
                    </select>
                    <button class="select-display" type="button">${escapeHtml(debt.type)}</button>
                  </span>
                  <input data-field="creditor" type="text" value="${escapeHtml(debt.creditor)}" />
                  <input data-field="amount" type="text" inputmode="decimal" value="${escapeHtml(formatDebtAmountInput(debt.amount))}" />
                  <span class="select-cell">
                    <select data-field="status" class="${statusClass(normalizeDebtStatus(debt))}">
                      ${debtStatusOptions.map((item) => `<option value="${item}" class="${statusClass(item)}" ${normalizeDebtStatus(debt) === item ? "selected" : ""}>${item}</option>`).join("")}
                    </select>
                  </span>
                  <span class="date-cell">
                    <input data-field="dueDate" type="date" value="${escapeHtml(debt.dueDate || "")}" />
                    <button class="date-display" type="button" data-action="pick-date">${escapeHtml(debt.dueDate || "日期")}</button>
                  </span>
                </div>
                <button class="debt-delete" type="button" data-action="delete-debt">删除</button>
              </div>
            `
          )
          .join("");
      }

      function syncDebtsFromRows() {
        debtRows.querySelectorAll(".debt-row").forEach((row) => {
          row.querySelectorAll("[data-field]").forEach((field) => {
            updateDebt(row.dataset.id, field.dataset.field, field.value);
          });
        });
      }

      function buildArchive() {
        syncDebtsFromRows();
        const data = Object.fromEntries(new FormData(archiveForm).entries());
        return {
          id: editingClientId || uid("client"),
          name: data.name.trim(),
          phone: data.phone.trim(),
          monthlyIncome: data.monthlyIncome.trim(),
          hasMortgage: data.hasMortgage,
          biggestConcern: data.biggestConcern.trim(),
          debts: debts
            .filter((debt) => debt.creditor.trim() || debt.amount.trim())
            .map((debt) => ({ ...debt, status: debt.status || statusFromDueDate(debt.dueDate) })),
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        };
      }

      function validateArchive(archive) {
        clearValidationErrors();
        if (!archive.name) {
          markValidationError(archiveForm.elements.name);
          return false;
        }
        const firstInvalidDebt = debts.find(
          (debt) => !debt.creditor.trim() && (debt.amount.trim() || archive.debts.length === 0)
        );
        if (firstInvalidDebt) {
          markValidationError(debtRows.querySelector(`.debt-row[data-id="${firstInvalidDebt.id}"] input[data-field="creditor"]`));
          return false;
        }
        return true;
      }

      function saveArchive() {
        const archive = buildArchive();
        if (!validateArchive(archive)) return;
        const clients = loadClients();
        const index = clients.findIndex((client) => client.id === archive.id || client.name === archive.name);
        if (index >= 0) {
          archive.id = clients[index].id;
          archive.createdAt = clients[index].createdAt || archive.createdAt;
          archive.followUps = clients[index].followUps || [];
          archive.plan = clients[index].plan || "";
          clients[index] = archive;
        } else {
          clients.push(archive);
        }
        saveClients(clients);
        selectedClientId = archive.id;
        editingClientId = null;
        showScreen("detail");
      }

      function renderClientList() {
        const query = clientSearch.value.trim().toLowerCase();
        const clients = loadClients().sort((a, b) => (b.updatedAt || "").localeCompare(a.updatedAt || ""));
        const alertCount = clients.filter(hasDueAlert).length;
        alertClientCount.textContent = alertCount;
        clientFilter.querySelectorAll("button").forEach((button) => {
          button.classList.toggle("active", button.dataset.filter === clientFilterMode);
        });
        const filtered = query
          ? clients.filter((client) => {
              const name = (client.name || "").toLowerCase();
              const phone = String(client.phone || "").replace(/\D/g, "");
              const normalizedQuery = query.replace(/\D/g, "");
              return name.includes(query) || (normalizedQuery && phone.includes(normalizedQuery));
            })
          : clients.filter((client) => clientFilterMode === "all" || hasDueAlert(client));
        if (!filtered.length) {
          clientList.innerHTML = `<div class="empty">${query ? "没有找到这个客户。" : "还没有保存客户档案。"}</div>`;
          return;
        }
        clientList.innerHTML = filtered
          .map(
            (client) => {
              const alert = clientDueAlert(client);
              return `
                <div class="client-line" data-client-id="${client.id}">
                  <button class="client-card" type="button">
                    <span class="client-main">
                      <strong>${escapeHtml(client.name || "未命名客户")}</strong>
                      <span class="client-time">录入时间：${formatDateTime(client.createdAt)}</span>
                    </span>
                    <span>电话：${escapeHtml(client.phone || "未填写")} · 总负债：${formatMoney(totalDebt(client))} · ${(client.debts || []).length} 笔债务</span>
                    ${alert ? `<span class="due-alert">${escapeHtml(alert)}</span>` : ""}
                  </button>
                  <button class="client-follow" type="button" data-action="follow-client">跟进</button>
                  <button class="client-delete" type="button" data-action="delete-client">删除</button>
                </div>
              `;
            }
          )
          .join("");
      }

      function removeClient(clientId) {
        const clients = loadClients().filter((client) => client.id !== clientId);
        saveClients(clients);
        if (selectedClientId === clientId) selectedClientId = null;
        renderClientList();
      }

      function renderDetail() {
        const client = getClient(selectedClientId);
        if (!client) {
          showScreen("home");
          return;
        }
        detailSummary.innerHTML = `
          <div class="detail-row"><span>姓名：</span><strong>${escapeHtml(client.name || "未填写")}</strong></div>
          <div class="detail-row"><span>联系电话：</span><strong>${escapeHtml(client.phone || "未填写")}</strong></div>
          <div class="detail-row"><span>月收入：</span><strong>${escapeHtml(client.monthlyIncome || "未填写")}</strong></div>
          <div class="detail-row"><span>总负债：</span><strong>${formatMoney(totalDebt(client))}</strong></div>
          <div class="detail-row"><span>最担心：</span><strong>${escapeHtml(client.biggestConcern || "未填写")}</strong></div>
        `;
        detailDebtList.innerHTML = `
          <div class="debt-head"><span>类型</span><span>机构</span><span>金额(万)</span><span>状态</span><span>到期日期</span></div>
          ${(client.debts || [])
            .map(
              (debt) => `
                <div class="debt-row">
                  <span>${escapeHtml(debt.type || "")}</span>
                  <span>${escapeHtml(debt.creditor || "")}</span>
                  <span>${escapeHtml(formatDebtAmountInput(debt.amount))}</span>
                  <span class="${statusClass(normalizeDebtStatus(debt))}">${escapeHtml(normalizeDebtStatus(debt))}</span>
                  <span class="${dueDateClass(debt)}">${escapeHtml(displayDueDate(debt.dueDate))}</span>
                </div>
              `
            )
            .join("")}
        `;
        const followUps = [...(client.followUps || [])].sort((a, b) => (b.time || "").localeCompare(a.time || ""));
        detailFollowList.innerHTML = followUps.length
          ? followUps
              .map(
                (item) => `
                  <div class="follow-line" data-follow-id="${item.id}">
                    <div class="follow-item">
                      <span class="follow-meta">${escapeHtml(formatFollowTime(item.time))} · ${escapeHtml(item.method || "电话")}${item.nextDate ? ` · 下次 ${escapeHtml(item.nextDate)}` : ""}</span>
                      <div class="follow-content">${escapeHtml(item.content || "")}</div>
                    </div>
                    <button class="follow-delete" type="button" data-action="delete-follow">删除</button>
                  </div>
                `
              )
              .join("")
          : `<div class="empty">还没有跟进记录。</div>`;
        lastPlan = "";
        planOutput.innerHTML = "";
        detailPlanSection.classList.remove("active");
        generateBtn.textContent = "展开方案";
      }

      function startAddFollow() {
        if (!selectedClientId) return;
        followForm.reset();
        followForm.elements.followTime.value = currentDateTimeInputValue();
        followForm.elements.followMethod.value = "电话";
        followMethodGroup.querySelectorAll("button").forEach((button) => {
          button.classList.toggle("active", button.dataset.value === "电话");
        });
        updateFollowCount();
        showScreen("follow");
      }

      function saveFollowUp() {
        const client = getClient(selectedClientId);
        if (!client) return;
        const content = followForm.elements.followContent.value.trim();
        if (!content) {
          followForm.elements.followContent.focus();
          return;
        }
        const clients = loadClients();
        const index = clients.findIndex((item) => item.id === selectedClientId);
        if (index < 0) return;
        const now = new Date().toISOString();
        const followUp = {
          id: uid("follow"),
          time: followForm.elements.followTime.value ? new Date(followForm.elements.followTime.value).toISOString() : now,
          method: followForm.elements.followMethod.value || "电话",
          nextDate: followForm.elements.nextFollowDate.value || "",
          content,
          createdAt: now
        };
        clients[index] = {
          ...clients[index],
          followUps: [followUp, ...(clients[index].followUps || [])],
          updatedAt: now
        };
        saveClients(clients);
        showScreen("detail");
      }

      function removeFollowUp(followId) {
        const clients = loadClients();
        const index = clients.findIndex((item) => item.id === selectedClientId);
        if (index < 0) return;
        clients[index] = {
          ...clients[index],
          followUps: (clients[index].followUps || []).filter((item) => item.id !== followId),
          updatedAt: new Date().toISOString()
        };
        saveClients(clients);
        renderDetail();
      }

      function createPlan(client) {
        const total = totalDebt(client);
        const income = parseMoney(client.monthlyIncome);
        const overdueCount = (client.debts || []).filter((debt) => normalizeDebtStatus(debt) === "逾期").length;
        const sorted = [...(client.debts || [])].sort((a, b) => {
          const riskA = (isRiskStatus(normalizeDebtStatus(a)) ? 2 : 0) + parseDebtAmount(a.amount) / (total || 1);
          const riskB = (isRiskStatus(normalizeDebtStatus(b)) ? 2 : 0) + parseDebtAmount(b.amount) / (total || 1);
          return riskB - riskA;
        });
        return `
          <div class="plan-card">
            <h3>风险概览</h3>
            <ul>
              <li>总负债：${formatMoney(total)} 元。</li>
              <li>逾期债务：${overdueCount} 笔。</li>
              <li>建议月还款池：${formatMoney(Math.max(0, income * (client.hasMortgage === "是" ? 0.32 : 0.42) - 525))} 元。</li>
            </ul>
          </div>
          <div class="plan-card">
            <h3>优先顺序</h3>
            <ol>
              ${sorted.map((debt) => `<li>${escapeHtml(debt.creditor)}：${escapeHtml(debt.type)}，${formatMoney(parseDebtAmount(debt.amount))} 元，${escapeHtml(normalizeDebtStatus(debt))}，到期日期：${escapeHtml(displayDueDate(debt.dueDate))}。</li>`).join("")}
            </ol>
          </div>
          <div class="plan-card">
            <h3>行动计划</h3>
            <ul>
              <li>先整理合同、账单、还款日和催收记录。</li>
              <li>优先处理逾期、到期临近、金额较大的债务。</li>
              <li>停止以贷养贷，按月还款池执行。</li>
            </ul>
          </div>
        `;
      }

      function generatePlan() {
        const client = getClient(selectedClientId);
        if (!client) return;
        lastPlan = createPlan(client);
        planOutput.innerHTML = lastPlan;
        detailPlanSection.classList.add("active");
        generateBtn.textContent = "收起方案";
      }

      function togglePlan() {
        if (!lastPlan) {
          generatePlan();
          return;
        }
        const isOpen = detailPlanSection.classList.toggle("active");
        generateBtn.textContent = isOpen ? "收起方案" : "展开方案";
      }

      function fallbackCopyText(text) {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.setAttribute("readonly", "");
        textarea.style.position = "fixed";
        textarea.style.left = "-9999px";
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        textarea.remove();
      }

      async function copyPlan() {
        const text = planOutput.innerText.trim();
        if (!text) return;
        try {
          if (navigator.clipboard?.writeText) {
            await navigator.clipboard.writeText(text);
          } else {
            fallbackCopyText(text);
          }
          copyPlanBtn.textContent = "已复制";
        } catch {
          fallbackCopyText(text);
          copyPlanBtn.textContent = "已复制";
        }
        setTimeout(() => {
          copyPlanBtn.textContent = "复制";
        }, 1200);
      }

      function exportBackup() {
        const pad = (number) => String(number).padStart(2, "0");
        const now = new Date();
        const stamp = `${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}-${pad(now.getHours())}${pad(now.getMinutes())}`;
        const backup = {
          app: "debt-customer-archive",
          version: "1.0.6",
          storageKey,
          exportedAt: now.toISOString(),
          clients: loadClients()
        };
        const blob = new Blob([JSON.stringify(backup, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `债务客户档案-${stamp}.json`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        window.setTimeout(() => URL.revokeObjectURL(url), 1000);
        window.alert("导出完成，请在浏览器下载记录中查看 JSON 文件。");
      }

      function importBackup(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.addEventListener("load", () => {
          try {
            const imported = readBackupClients(JSON.parse(reader.result));
            if (!imported) throw new Error("invalid backup");
            const message = `将导入 ${imported.length} 个客户档案，并覆盖当前本机档案。是否继续？`;
            if (!window.confirm(message)) return;
            saveClients(imported);
            selectedClientId = null;
            editingClientId = null;
            renderClientList();
            showScreen("home");
            window.alert("导入完成");
          } catch {
            window.alert("导入失败，请选择有效的客户档案 JSON 文件。");
          } finally {
            backupFileInput.value = "";
          }
        });
        reader.addEventListener("error", () => {
          backupFileInput.value = "";
          window.alert("读取文件失败，请重新选择。");
        });
        reader.readAsText(file);
      }

      leftAction.addEventListener("click", () => {
        if (currentScreen === "form") {
          if (editingClientId && selectedClientId) showScreen("detail");
          else showScreen("home");
        } else if (currentScreen === "detail") {
          showScreen("home");
        } else if (currentScreen === "follow") {
          showScreen("detail");
        }
      });

      rightAction.addEventListener("click", () => {
        if (currentScreen === "home") startNewClient();
        else if (currentScreen === "form") {
          if (editingClientId && selectedClientId) showScreen("detail");
          else showScreen("home");
        } else if (currentScreen === "detail") editClient(selectedClientId);
        else if (currentScreen === "follow") saveFollowUp();
      });

      clientSearch.addEventListener("input", renderClientList);
      exportBtn.addEventListener("click", exportBackup);
      importBtn.addEventListener("click", () => backupFileInput.click());
      backupFileInput.addEventListener("change", () => importBackup(backupFileInput.files[0]));

      clientFilter.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-filter]");
        if (!button) return;
        clientFilterMode = button.dataset.filter;
        renderClientList();
      });

      clientList.addEventListener("click", (event) => {
        const line = event.target.closest(".client-line");
        if (!line) return;
        const action = event.target.closest("[data-action]");
        if (action?.dataset.action === "follow-client") {
          selectedClientId = line.dataset.clientId;
          startAddFollow();
          clientDidSwipe = false;
          return;
        }
        if (action?.dataset.action === "delete-client") {
          removeClient(line.dataset.clientId);
          clientDidSwipe = false;
          return;
        }
        if (clientDidSwipe) {
          clientDidSwipe = false;
          return;
        }
        if (line.classList.contains("open")) {
          line.classList.remove("open");
          return;
        }
        const card = event.target.closest(".client-card");
        if (!card) return;
        selectedClientId = line.dataset.clientId;
        showScreen("detail");
      });

      archiveForm.addEventListener("submit", (event) => event.preventDefault());
      document.querySelector("#addDebtBtn").addEventListener("click", () => addDebt());
      saveBtn.addEventListener("click", () => {
        tapButton(saveBtn);
        saveArchive();
      });
      addFollowBtn.addEventListener("click", startAddFollow);
      generateBtn.addEventListener("click", () => {
        tapButton(generateBtn);
        togglePlan();
      });
      copyPlanBtn.addEventListener("click", copyPlan);
      concernField.addEventListener("input", updateConcernCount);
      followContentField.addEventListener("input", updateFollowCount);

      archiveForm.addEventListener("input", (event) => {
        event.target.classList.remove("is-error");
      });

      mortgageGroup.addEventListener("click", (event) => {
        const button = event.target.closest("button");
        if (!button) return;
        mortgageGroup.querySelectorAll("button").forEach((item) => item.classList.toggle("active", item === button));
        archiveForm.elements.hasMortgage.value = button.dataset.value;
      });

      followMethodGroup.addEventListener("click", (event) => {
        const button = event.target.closest("button");
        if (!button) return;
        followMethodGroup.querySelectorAll("button").forEach((item) => item.classList.toggle("active", item === button));
        followForm.elements.followMethod.value = button.dataset.value;
      });

      debtRows.addEventListener("input", (event) => {
        const row = event.target.closest(".debt-row");
        const field = event.target.dataset.field;
        if (row && field) updateDebt(row.dataset.id, field, event.target.value);
      });

      debtRows.addEventListener("change", (event) => {
        const row = event.target.closest(".debt-row");
        const field = event.target.dataset.field;
        if (row && field) updateDebt(row.dataset.id, field, event.target.value);
        if (field === "status") {
          event.target.classList.remove("is-overdue", "is-reminder", "is-settled");
          const className = statusClass(event.target.value);
          if (className) event.target.classList.add(className);
        }
        if (field === "dueDate") {
          updateDebt(row.dataset.id, "status", statusFromDueDate(event.target.value));
        }
        if (field === "type" || field === "dueDate") renderDebts();
      });

      debtRows.addEventListener("focusout", (event) => {
        const row = event.target.closest(".debt-row");
        if (!row || event.target.dataset.field !== "amount") return;
        const formatted = formatDebtAmountInput(event.target.value);
        event.target.value = formatted;
        updateDebt(row.dataset.id, "amount", formatted);
      });

      debtRows.addEventListener("click", (event) => {
        const dateCell = event.target.closest(".date-cell");
        if (dateCell) {
          const input = dateCell.querySelector("input[data-field='dueDate']");
          if (input && typeof input.showPicker === "function") input.showPicker();
          else input?.focus();
        }
        const line = event.target.closest(".debt-line");
        if (line && event.target.closest("[data-action='delete-debt']")) removeDebt(line.dataset.id);
      });

      detailFollowList.addEventListener("click", (event) => {
        const line = event.target.closest(".follow-line");
        if (line && event.target.closest("[data-action='delete-follow']")) removeFollowUp(line.dataset.followId);
      });

      let swipeStartX = 0;
      let swipeTarget = null;
      let followSwipeStartX = 0;
      let followSwipeTarget = null;
      let clientSwipeStartX = 0;
      let clientSwipeTarget = null;
      let clientDidSwipe = false;

      function openClientActions(target) {
        document.querySelectorAll(".client-line.open").forEach((row) => {
          if (row !== target) row.classList.remove("open");
        });
        target.classList.add("open");
      }

      function handleClientSwipe(endX) {
        if (!clientSwipeTarget) return;
        const distance = endX - clientSwipeStartX;
        if (distance < -28) {
          clientDidSwipe = true;
          openClientActions(clientSwipeTarget);
        }
        if (distance > 28) {
          clientDidSwipe = true;
          clientSwipeTarget.classList.remove("open");
        }
        clientSwipeTarget = null;
      }

      clientList.addEventListener("pointerdown", (event) => {
        clientSwipeTarget = event.target.closest(".client-line");
        clientSwipeStartX = event.clientX;
        clientDidSwipe = false;
      });

      clientList.addEventListener("pointerup", (event) => {
        handleClientSwipe(event.clientX);
      });

      clientList.addEventListener("touchstart", (event) => {
        clientSwipeTarget = event.target.closest(".client-line");
        clientSwipeStartX = event.changedTouches[0].clientX;
        clientDidSwipe = false;
      }, { passive: true });

      clientList.addEventListener("touchend", (event) => {
        handleClientSwipe(event.changedTouches[0].clientX);
      });

      function openDebtActions(target) {
        document.querySelectorAll(".debt-line.open").forEach((row) => {
          if (row !== target) row.classList.remove("open");
        });
        target.classList.add("open");
      }

      function handleDebtSwipe(endX) {
        if (!swipeTarget) return;
        const distance = endX - swipeStartX;
        if (distance < -28) openDebtActions(swipeTarget);
        if (distance > 28) swipeTarget.classList.remove("open");
        swipeTarget = null;
      }

      debtRows.addEventListener("pointerdown", (event) => {
        swipeTarget = event.target.closest(".debt-line");
        swipeStartX = event.clientX;
      });

      debtRows.addEventListener("pointerup", (event) => {
        handleDebtSwipe(event.clientX);
      });

      debtRows.addEventListener("touchstart", (event) => {
        swipeTarget = event.target.closest(".debt-line");
        swipeStartX = event.changedTouches[0].clientX;
      }, { passive: true });

      debtRows.addEventListener("touchend", (event) => {
        handleDebtSwipe(event.changedTouches[0].clientX);
      });

      function openFollowActions(target) {
        document.querySelectorAll(".follow-line.open").forEach((row) => {
          if (row !== target) row.classList.remove("open");
        });
        target.classList.add("open");
      }

      function handleFollowSwipe(endX) {
        if (!followSwipeTarget) return;
        const distance = endX - followSwipeStartX;
        if (distance < -28) openFollowActions(followSwipeTarget);
        if (distance > 28) followSwipeTarget.classList.remove("open");
        followSwipeTarget = null;
      }

      detailFollowList.addEventListener("pointerdown", (event) => {
        followSwipeTarget = event.target.closest(".follow-line");
        followSwipeStartX = event.clientX;
      });

      detailFollowList.addEventListener("pointerup", (event) => {
        handleFollowSwipe(event.clientX);
      });

      detailFollowList.addEventListener("touchstart", (event) => {
        followSwipeTarget = event.target.closest(".follow-line");
        followSwipeStartX = event.changedTouches[0].clientX;
      }, { passive: true });

      detailFollowList.addEventListener("touchend", (event) => {
        handleFollowSwipe(event.changedTouches[0].clientX);
      });

      function updateConcernCount() {
        concernCounter.textContent = `${concernField.value.length}/200`;
      }

      function updateFollowCount() {
        followCounter.textContent = `${followContentField.value.length}/200`;
      }

      migrateClients();
      renderClientList();
      showScreen("home");
    </script>
  </body>
</html>
