<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>债务客户档案</title>
    <style>
      :root{--bg:#eef2f0;--surface:#fff;--ink:#14211f;--muted:#6c7774;--line:#dde6e3;--accent:#08766f;--accent-dark:#075c57;--accent-soft:#e4f3f0;--danger:#b13b3b;--danger-soft:#ffecec;--warning:#9a5a05;--ok:#287245}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--bg);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}button,input,select,textarea{font:inherit}button{border:0;cursor:pointer}h1,h2,h3,h4,p{margin-top:0}.app-shell{width:min(100%,430px);min-height:100dvh;margin:0 auto;padding:0 0 86px;background:var(--bg)}.app-header{position:sticky;top:0;z-index:10;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;padding:14px 14px 12px;border-bottom:1px solid rgba(221,230,227,.92);background:rgba(255,255,255,.94);backdrop-filter:blur(16px)}.app-kicker{display:flex;align-items:center;gap:8px;margin-bottom:2px;color:var(--accent);font-size:12px;font-weight:820}.version-badge{display:inline-flex;align-items:center;min-height:20px;padding:0 7px;border-radius:999px;background:var(--accent-soft);color:var(--accent);font-size:11px;font-weight:820}h1{margin-bottom:0;font-size:22px;letter-spacing:0}h2{margin-bottom:5px;font-size:17px}h3{margin-bottom:10px;font-size:15px}h4{margin-bottom:8px;font-size:14px}.primary,.ghost,.danger-btn,.back-btn{min-height:40px;padding:0 14px;border-radius:13px;font-weight:820}.primary{background:var(--accent);color:#fff}.primary:hover{background:var(--accent-dark)}.ghost,.back-btn{border:1px solid var(--line);background:#fff;color:var(--ink)}.danger-btn{background:var(--danger-soft);color:var(--danger)}.small{min-height:34px;padding:0 12px;border-radius:11px;font-size:13px}.app-content{padding:8px 0 14px}.app-view{display:none}.app-view.is-active{display:grid;gap:8px}.screen-card{overflow:hidden;border:0;border-radius:0;background:rgba(255,255,255,.96)}.card-head{padding:14px 16px 10px;border-bottom:1px solid var(--line);background:transparent}.card-head p,.status-line,.detail-hero p{margin-bottom:0;color:var(--muted);font-size:13px;line-height:1.5}.field-list{display:grid;gap:0;padding:0 16px}label,.search-field{display:grid;grid-template-columns:92px 1fr;gap:12px;align-items:center;min-height:54px;padding:10px 0;border:0;border-bottom:1px solid var(--line);border-radius:0;background:transparent;color:#33423f;font-size:13px;font-weight:780}.field-list label:last-child{border-bottom:0}.textarea-field{align-items:start}input,select,textarea{width:100%;border:0;background:transparent;color:var(--ink);outline:none}input,select{min-height:32px;padding:0;font-size:16px}textarea{min-height:74px;padding:0;resize:vertical;font-size:16px}input::placeholder,textarea::placeholder{color:#9aa5a3}label:focus-within,.search-field:focus-within{border-bottom-color:rgba(8,118,111,.5)}.date-selects{display:flex;justify-content:flex-start;gap:4px;min-width:0}.date-selects select{width:auto;min-width:0;flex:0 0 auto;font-weight:780}#paymentYear{max-width:86px}#paymentMonth,#paymentDay{max-width:64px}.status-line{padding:2px 16px 8px}.status-line[data-type=ok]{color:var(--ok)}.status-line[data-type=error]{color:var(--danger)}.library-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}.library-head span{display:inline-flex;align-items:center;min-height:28px;padding:0 10px;border-radius:999px;background:var(--accent-soft);color:var(--accent);font-size:12px;font-weight:820;white-space:nowrap}.client-list{display:grid;gap:0;background:#fff}.client-card,.empty-card{width:100%;border:0;border-bottom:1px solid var(--line);border-radius:0;background:#fff}.client-card{display:grid;grid-template-columns:1fr auto;gap:12px;padding:14px 16px;color:var(--ink);text-align:left}.client-card strong{display:block;margin-bottom:5px;font-size:16px}.client-card span span,.client-card small{display:block;color:var(--muted);font-size:12px;line-height:1.5}.client-card em{align-self:center;color:var(--accent);font-size:13px;font-style:normal;font-weight:820}.empty-card{padding:18px 16px;color:var(--muted);font-size:13px;line-height:1.6}.detail-hero{display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:center;padding:14px 16px;border-bottom:1px solid var(--line)}.detail-hero h2{margin-bottom:0;font-size:22px}.detail-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px 16px 14px}.detail-actions .danger-btn{grid-column:1/-1}.detail-grid{display:grid;gap:0;padding:0 16px}.detail-field{display:grid;grid-template-columns:92px 1fr;gap:12px;align-items:start;padding:12px 0;border-bottom:1px solid var(--line)}.detail-field:last-child{border-bottom:0}.detail-field span{color:var(--muted);font-size:12px;font-weight:760}.detail-field strong{color:var(--ink);font-size:15px;line-height:1.5}.split-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}.plan-empty{margin:0;padding:16px;color:var(--muted);font-size:13px;line-height:1.6}.plan{padding:0 16px 16px}.summary-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}.metric{padding:10px;border:1px solid var(--line);border-radius:12px;background:#f7faf8}.metric span{display:block;margin-bottom:7px;color:var(--muted);font-size:12px;font-weight:760}.metric strong{display:block;font-size:16px}.badge{display:inline-flex;align-items:center;min-height:26px;padding:0 9px;border-radius:999px;font-size:12px;font-weight:820}.badge.ok{background:#e8f5ed;color:var(--ok)}.badge.warn{background:#fff2dc;color:var(--warning)}.badge.danger{background:var(--danger-soft);color:var(--danger)}.plan-section{padding:12px 0;border-top:1px solid var(--line)}.plan-section:first-of-type{border-top:0;padding-top:0}.plan ul,.plan ol{margin:0;padding-left:20px;color:#2f3d45;line-height:1.7}.plan li+li{margin-top:6px}.allocation{display:grid;gap:9px}.allocation-row{display:grid;grid-template-columns:82px 1fr;gap:8px 10px;align-items:center;font-size:13px}.allocation-row strong{grid-column:2}.bar-track{overflow:hidden;height:10px;border-radius:999px;background:#e3ebe8}.bar-fill{height:100%;border-radius:inherit;background:var(--accent)}.script-box{margin:0;padding:13px;border-left:4px solid var(--accent);border-radius:8px;background:var(--accent-soft);color:#21333a;line-height:1.7}.bottom-nav{position:fixed;right:max(12px,calc((100vw - 430px)/2 + 12px));bottom:12px;left:max(12px,calc((100vw - 430px)/2 + 12px));z-index:20;display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:8px;border:1px solid rgba(221,230,227,.92);border-radius:20px;background:rgba(255,255,255,.95);box-shadow:0 16px 36px rgba(20,33,31,.18);backdrop-filter:blur(16px)}.nav-btn{min-height:44px;border-radius:14px;background:transparent;color:var(--muted);font-size:14px;font-weight:820}.nav-btn.is-active{background:var(--accent);color:#fff}@media (min-width:700px){body{background:linear-gradient(90deg,rgba(8,118,111,.08),transparent 34%,rgba(8,118,111,.08)),var(--bg)}.app-shell{margin-top:18px;margin-bottom:18px;border:1px solid rgba(221,230,227,.9);border-radius:30px;overflow:hidden;box-shadow:0 22px 60px rgba(20,33,31,.14)}}
    </style>
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div><p class="app-kicker"><span id="viewKicker">客户录入</span><span class="version-badge">v1.0.0</span></p><h1 id="viewTitle">保存客户信息</h1></div>
      </header>
      <section class="app-content">
        <form class="app-view is-active" id="clientForm" data-view="entry">
          <section class="screen-card">
            <div class="card-head"><h2>客户信息</h2><p>填写后保存到客户库，再进入详情生成方案。</p></div>
            <div class="field-list">
              <label>姓名：<input name="name" type="text" /></label>
              <label>联系电话：<input name="phone" type="tel" inputmode="tel" /></label>
              <label>月收入：<input name="monthlyIncome" type="text" inputmode="decimal" /></label>
              <label class="date-field">还款日：<span class="date-selects"><select id="paymentYear" aria-label="还款年"></select><select id="paymentMonth" aria-label="还款月"></select><select id="paymentDay" aria-label="还款日"></select><input name="paymentDate" type="hidden" /></span></label>
              <label>是否有房贷：<select name="hasMortgage"><option value="否">否</option><option value="是">是</option></select></label>
              <label>总负债：<input name="totalDebt" type="text" inputmode="decimal" /></label>
              <label>信用卡：<input name="creditCard" type="text" inputmode="decimal" /></label>
              <label>网贷：<input name="onlineLoan" type="text" inputmode="decimal" /></label>
              <label>银行贷款：<input name="bankLoan" type="text" inputmode="decimal" /></label>
              <label>最大欠款银行：<input name="largestBank" type="text" /></label>
              <label>最大欠款平台：<input name="largestPlatform" type="text" /></label>
              <label>逾期多久：<input name="overdue" type="text" /></label>
              <label>是否被催收：<select name="isCollected"><option value="否">否</option><option value="是">是</option></select></label>
              <label class="textarea-field">最担心什么：<textarea name="biggestConcern" rows="3"></textarea></label>
            </div>
          </section>
          <p class="status-line" id="clientSaveStatus">客户资料保存在本机浏览器。</p>
        </form>
        <section class="app-view" data-view="library">
          <section class="screen-card">
            <div class="card-head library-head"><div><h2>客户库</h2><p>按姓名查询，点击客户进入详情。</p></div><span id="clientCount">0 位</span></div>
            <label class="search-field">查询姓名：<input id="clientSearchInput" type="search" /></label>
          </section>
          <div class="client-list" id="clientList"></div>
        </section>
        <section class="app-view" data-view="detail">
          <section class="screen-card">
            <div class="detail-hero"><button class="back-btn" id="backToLibraryBtn" type="button">返回</button><div><p>客户详情</p><h2 id="detailName">未选择客户</h2></div></div>
            <div class="detail-actions"><button class="ghost" id="editClientBtn" type="button">编辑资料</button><button class="primary" id="generatePlanBtn" type="button">生成方案</button><button class="danger-btn" id="deleteClientBtn" type="button">删除客户</button></div>
          </section>
          <section class="screen-card"><div class="card-head"><h2>档案信息</h2><p id="detailUpdatedAt">请选择客户。</p></div><div class="detail-grid" id="detailFields"></div></section>
          <section class="screen-card"><div class="card-head split-head"><div><h2>债务优化方案</h2><p>从客户详情生成，便于一人一档。</p></div><button class="ghost small" id="copyPlanBtn" type="button">复制方案</button></div><div class="plan-empty" id="emptyState">点击“生成方案”后，这里会显示风险等级、优先顺序和 90 天动作。</div><article class="plan" id="planOutput" hidden></article></section>
        </section>
      </section>
      <nav class="bottom-nav" aria-label="底部导航"><button class="nav-btn is-active" type="button" data-target-view="entry">录入</button><button class="nav-btn" type="button" data-target-view="library">客户库</button></nav>
    </main>
    <script>
      const defaultRules={capacity:{baseIncomeRatio:.42,mortgageIncomeRatio:.32,minimumLivingCost:3500},riskScore:{overdue30Days:18,overdue90Days:34,overdue180Days:48,collected:18,debtIncomeRatioHigh:16,debtIncomeRatioSevere:28,mortgagePressure:8},priorityWeights:{overdue:35,collection:18,bankRelationship:16,platformRisk:12,amountShare:19},negotiation:{creditCard:["优先申请停息分期或个性化分期，先说明收入、负债结构和稳定还款意愿。","准备收入证明、困难说明、负债清单和近 3 个月流水，沟通目标为降低月供波动。"],onlineLoan:["先核对综合费率、服务费、担保费和已还金额，避免在争议未厘清前盲目展期。","对催收强的平台保留通话、短信和还款协商记录，沟通只围绕本金、合法利息和可执行周期。"],bankLoan:["银行贷款以保征信、保资产、保现金流为第一顺位，争取展期、重组或阶段性降低月供。","若已逾期，先联系最大欠款银行，避免进入诉讼或资产保全节奏。"]},phasePlan:[{title:"第 1-7 天：盘点与止损",actions:["整理所有合同、账单、利率、还款日、逾期天数和催收记录。","停止以贷养贷和短期高息周转，把收入优先放入基本生活、房贷和协商资金池。","向最大欠款机构做第一次主动沟通，记录对方工号、方案和时间。"]},{title:"第 8-30 天：协商与排序",actions:["按风险和金额占比逐一沟通，先处理可能起诉、强催收或影响资产的债务。","把可承受月供拆成固定预算，不承诺超过收入承压线的还款方案。","对不合理费用提出书面核账请求，保留全部沟通证据。"]},{title:"第 31-90 天：执行与复盘",actions:["每周更新剩余本金、已还金额和下一还款日，发现预算偏离及时调整。","优先清理小额高压账户，减少催收触点，再集中处理大额主债权人。","收入提升或支出下降后，把新增现金流优先投向逾期时间最长的账户。"]}]};
      const storageKey="debtOptimizationClientsSingleFile";
      const form=document.querySelector("#clientForm"),appViews=document.querySelectorAll(".app-view"),navButtons=document.querySelectorAll(".nav-btn"),clientSaveStatus=document.querySelector("#clientSaveStatus"),clientSearchInput=document.querySelector("#clientSearchInput"),clientList=document.querySelector("#clientList"),clientCount=document.querySelector("#clientCount"),viewKicker=document.querySelector("#viewKicker"),viewTitle=document.querySelector("#viewTitle"),detailName=document.querySelector("#detailName"),detailUpdatedAt=document.querySelector("#detailUpdatedAt"),detailFields=document.querySelector("#detailFields"),planOutput=document.querySelector("#planOutput"),emptyState=document.querySelector("#emptyState"),copyPlanBtn=document.querySelector("#copyPlanBtn"),paymentYear=document.querySelector("#paymentYear"),paymentMonth=document.querySelector("#paymentMonth"),paymentDay=document.querySelector("#paymentDay");
      let selectedClientId=null;
      const viewMeta={entry:{kicker:"客户录入",title:"保存客户信息"},library:{kicker:"客户库",title:"查询客户档案"},detail:{kicker:"客户详情",title:"档案与方案"}};
      function setActiveView(v){appViews.forEach(x=>x.classList.toggle("is-active",x.dataset.view===v));navButtons.forEach(b=>b.classList.toggle("is-active",b.dataset.targetView===v));const m=viewMeta[v]||viewMeta.entry;viewKicker.textContent=m.kicker;viewTitle.textContent=m.title;scrollTo({top:0,behavior:"smooth"})}
      function escapeHtml(v){return String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
      function parseMoney(v){if(!v)return 0;const r=String(v).trim().replace(/,/g,""),n=Number(r.replace(/[^\d.]/g,""));return Number.isNaN(n)?0:r.includes("万")?n*1e4:n}
      function parseOverdueDays(v){const r=String(v||"").trim();if(!r||/未|无|0/.test(r))return 0;const n=Number(r.replace(/[^\d.]/g,""));if(Number.isNaN(n))return 0;if(r.includes("年"))return n*365;if(r.includes("月"))return n*30;if(r.includes("周"))return n*7;return n}
      function formatMoney(v){if(!Number.isFinite(v))return"0 元";return Math.abs(v)>=1e4?`${(v/1e4).toFixed(1)} 万`:`${Math.round(v).toLocaleString("zh-CN")} 元`}
      function formatDateTime(v){if(!v)return"未保存";const d=new Date(v);return Number.isNaN(d.getTime())?"未保存":d.toLocaleString("zh-CN",{year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"})}
      function pad(v){return String(v).padStart(2,"0")}function daysInMonth(y,m){return new Date(Number(y),Number(m),0).getDate()}function populateSelect(s,vals,suf=""){s.innerHTML=vals.map(v=>`<option value="${v}">${v}${suf}</option>`).join("")}
      function updatePaymentDays(){const old=Number(paymentDay.value)||new Date().getDate(),days=daysInMonth(paymentYear.value,paymentMonth.value);populateSelect(paymentDay,Array.from({length:days},(_,i)=>i+1),"日");paymentDay.value=Math.min(old,days);syncPaymentDateField()}
      function syncPaymentDateField(){const f=form.elements.paymentDate;if(!f||!paymentYear.value||!paymentMonth.value||!paymentDay.value)return;f.value=`${paymentYear.value}-${pad(paymentMonth.value)}-${pad(paymentDay.value)}`}
      function setPaymentDateSelects(v){const d=v?new Date(v):new Date(),ok=Number.isNaN(d.getTime())?new Date():d;paymentYear.value=ok.getFullYear();paymentMonth.value=ok.getMonth()+1;updatePaymentDays();paymentDay.value=ok.getDate();syncPaymentDateField()}
      function initDate(){const y=new Date().getFullYear();populateSelect(paymentYear,Array.from({length:7},(_,i)=>y-1+i),"年");populateSelect(paymentMonth,Array.from({length:12},(_,i)=>i+1),"月");updatePaymentDays();setPaymentDateSelects()}
      function getFormData(){syncPaymentDateField();return Object.fromEntries(new FormData(form).entries())}
      function fillForm(data){Object.entries(data).forEach(([k,v])=>{const f=form.elements[k];if(f)f.value=v??""});setPaymentDateSelects(data.paymentDate)}
      function clearForm(){form.reset();setPaymentDateSelects();syncPaymentDateField()}
      function clearPlan(){planOutput.hidden=true;planOutput.innerHTML="";emptyState.hidden=false}
      function loadClients(){try{return JSON.parse(localStorage.getItem(storageKey)||"[]")}catch{return[]}}function saveClients(c){localStorage.setItem(storageKey,JSON.stringify(c))}
      function setClientStatus(m,t="muted"){clientSaveStatus.textContent=m;clientSaveStatus.dataset.type=t}
      function summarizeClient(c){const debt=parseMoney(c.totalDebt),income=parseMoney(c.monthlyIncome);return `${debt?`负债 ${formatMoney(debt)}`:"负债未填"} · ${income?`收入 ${formatMoney(income)}`:"收入未填"} · ${c.overdue?`逾期 ${c.overdue}`:"逾期未填"}`}
      function saveCurrentClient(){const c=getFormData(),name=c.name.trim();if(!name){setClientStatus("请先填写客户姓名，再保存。","error");setActiveView("entry");return}const clients=loadClients(),idx=clients.findIndex(x=>(x.name||"").trim()===name),now=new Date().toISOString(),record={...c,id:idx>=0?clients[idx].id:`client-${Date.now()}`,createdAt:idx>=0?clients[idx].createdAt:now,updatedAt:now};if(idx>=0){clients[idx]=record;setClientStatus(`已更新 ${name} 的客户资料。`,"ok")}else{clients.push(record);setClientStatus(`已保存 ${name} 到客户库。`,"ok")}saveClients(clients);clearForm();renderClientLibrary();setActiveView("library")}
      function renderClientLibrary(){const q=clientSearchInput.value.trim().toLowerCase(),clients=loadClients().sort((a,b)=>(b.updatedAt||"").localeCompare(a.updatedAt||"")),filtered=q?clients.filter(c=>(c.name||"").toLowerCase().includes(q)):clients;clientCount.textContent=`${clients.length} 位`;if(!filtered.length){clientList.innerHTML=`<div class="empty-card">${q?"没有找到这个姓名的客户。":"还没有客户档案。先到录入页保存信息。"}</div>`;return}clientList.innerHTML=filtered.map(c=>`<button class="client-card" type="button" data-client-id="${c.id}"><span><strong>${escapeHtml(c.name||"未命名客户")}</strong><span>${escapeHtml(summarizeClient(c))}</span><small>更新：${escapeHtml(formatDateTime(c.updatedAt))}</small></span><em>详情</em></button>`).join("")}
      function getClientById(id){return loadClients().find(c=>c.id===id)}
      function showClientDetail(id){const c=getClientById(id);if(!c){selectedClientId=null;renderClientLibrary();setActiveView("library");return}selectedClientId=c.id;detailName.textContent=c.name||"未命名客户";detailUpdatedAt.textContent=`最近更新：${formatDateTime(c.updatedAt)}`;clearPlan();const fields=[["联系电话：",c.phone],["月收入：",c.monthlyIncome],["总负债：",c.totalDebt],["信用卡：",c.creditCard],["网贷：",c.onlineLoan],["银行贷款：",c.bankLoan],["最大欠款银行：",c.largestBank],["最大欠款平台：",c.largestPlatform],["逾期多久：",c.overdue],["还款日：",c.paymentDate],["是否有房贷：",c.hasMortgage],["是否被催收：",c.isCollected],["最担心什么：",c.biggestConcern]];detailFields.innerHTML=fields.map(([l,v])=>`<div class="detail-field"><span>${escapeHtml(l)}</span><strong>${escapeHtml(v||"未填写")}</strong></div>`).join("");setActiveView("detail")}
      function editSelectedClient(){const c=getClientById(selectedClientId);if(!c)return;fillForm(c);setClientStatus(`正在编辑 ${c.name||"客户"}。保存后会更新客户库。`);setActiveView("entry")}
      function deleteSelectedClient(){const c=getClientById(selectedClientId);if(!c)return;if(!confirm(`确定删除 ${c.name||"这个客户"} 的档案吗？`))return;saveClients(loadClients().filter(x=>x.id!==selectedClientId));selectedClientId=null;renderClientLibrary();setActiveView("library")}
      function calculateRisk(c,r,days,ratio){let s=12;if(days>=30)s+=r.riskScore.overdue30Days;if(days>=90)s+=r.riskScore.overdue90Days;if(days>=180)s+=r.riskScore.overdue180Days;if(c.isCollected==="是")s+=r.riskScore.collected;if(ratio>=18)s+=r.riskScore.debtIncomeRatioHigh;if(ratio>=30)s+=r.riskScore.debtIncomeRatioSevere;if(c.hasMortgage==="是")s+=r.riskScore.mortgagePressure;return Math.min(s,100)}
      function riskLabel(s){if(s>=72)return{text:"高风险",className:"danger"};if(s>=44)return{text:"中风险",className:"warn"};return{text:"可控",className:"ok"}}
      function buildPriorityQueue(c,r,debts,days){const total=debts.reduce((sum,x)=>sum+x.amount,0)||1;return debts.filter(x=>x.amount>0).map(x=>{let score=x.amount/total*r.priorityWeights.amountShare;if(days>0)score+=r.priorityWeights.overdue;if(c.isCollected==="是")score+=r.priorityWeights.collection;if(x.key==="bankLoan")score+=r.priorityWeights.bankRelationship;if(x.key==="onlineLoan")score+=r.priorityWeights.platformRisk;const reason=[];if(x.key==="bankLoan")reason.push("银行贷款关系到征信、资产和诉讼节奏");if(x.key==="creditCard")reason.push("信用卡适合优先谈停息分期和账单重组");if(x.key==="onlineLoan")reason.push("网贷需先核账、控催收、避免继续展期");if(days>0)reason.push(`已逾期约 ${days} 天`);if(c.isCollected==="是")reason.push("已有催收压力");return{...x,score,reason}}).sort((a,b)=>b.score-a.score)}
      function createAllocation(capacity,q){const total=q.reduce((s,x)=>s+x.score,0)||1;return q.map(x=>({...x,monthlyPay:Math.min(x.amount,capacity*x.score/total),percent:x.score/total*100}))}
      function listItems(items){return`<ul>${items.map(x=>`<li>${escapeHtml(x)}</li>`).join("")}</ul>`}
      function renderPlan(c,r=defaultRules){const declared=parseMoney(c.totalDebt),debts=[{key:"bankLoan",label:"银行贷款",amount:parseMoney(c.bankLoan)},{key:"creditCard",label:"信用卡",amount:parseMoney(c.creditCard)},{key:"onlineLoan",label:"网贷",amount:parseMoney(c.onlineLoan)}],calc=debts.reduce((s,x)=>s+x.amount,0),total=declared||calc,income=parseMoney(c.monthlyIncome),days=parseOverdueDays(c.overdue),ratio=income>0?total/income:0,incomeRatio=c.hasMortgage==="是"?r.capacity.mortgageIncomeRatio:r.capacity.baseIncomeRatio,capacity=Math.max(0,income*incomeRatio-r.capacity.minimumLivingCost*.15),riskScore=calculateRisk(c,r,days,ratio),risk=riskLabel(riskScore),queue=buildPriorityQueue(c,r,debts,days),allocation=createAllocation(capacity,queue),name=c.name||"客户",mismatch=declared&&calc&&Math.abs(declared-calc)>declared*.08?`申报总负债为 ${formatMoney(declared)}，分项合计为 ${formatMoney(calc)}，建议先核对口径。`:"总负债与分项数据基本一致，可进入方案沟通。",biggest=c.largestBank||c.largestPlatform||"最大债权方";planOutput.innerHTML=`<div class="summary-strip"><div class="metric"><span>总负债</span><strong>${formatMoney(total)}</strong></div><div class="metric"><span>月还款池</span><strong>${formatMoney(capacity)}</strong></div><div class="metric"><span>风险等级</span><strong><span class="badge ${risk.className}">${risk.text} ${riskScore}/100</span></strong></div></div><section class="plan-section"><h3>客户判断</h3>${listItems([`${name} 当前债务收入比约为 ${ratio.toFixed(1)} 倍，需要先稳住基本生活和刚性支出。`,mismatch,c.hasMortgage==="是"?"有房贷，方案优先保护房贷连续还款和资产安全。":"无房贷，可把更多现金流用于清理高压账户。",c.isCollected==="是"?"已被催收，沟通记录和证据留存要同步做。":"暂未被催收，适合在逾期扩大前主动协商。",`客户最担心：${c.biggestConcern||"征信、催收和现金流失控"}。`])}</section><section class="plan-section"><h3>优先处理顺序</h3><ol>${queue.map(x=>`<li><strong>${escapeHtml(x.label)}：${formatMoney(x.amount)}</strong>。${escapeHtml(x.reason.join("；"))}。</li>`).join("")}</ol></section><section class="plan-section"><h3>月度资金分配</h3><div class="allocation">${allocation.map(x=>`<div class="allocation-row"><span>${escapeHtml(x.label)}</span><div class="bar-track"><div class="bar-fill" style="width:${Math.max(8,x.percent)}%"></div></div><strong>${formatMoney(x.monthlyPay)}</strong></div>`).join("")}</div></section><section class="plan-section"><h3>90 天动作</h3>${r.phasePlan.map(p=>`<h4>${escapeHtml(p.title)}</h4>${listItems(p.actions)}`).join("")}</section><section class="plan-section"><h3>协商口径</h3><p class="script-box">${escapeHtml(name)} 目前收入约 ${formatMoney(income)}，总负债 ${formatMoney(total)}。建议先与 ${escapeHtml(biggest)} 主动沟通，目标不是逃避债务，而是确认本金、降低短期月供压力，并形成能连续执行的方案。</p></section><section class="plan-section"><h3>建议动作</h3>${listItems([...r.negotiation.bankLoan,...r.negotiation.creditCard,...r.negotiation.onlineLoan])}</section>`;emptyState.hidden=true;planOutput.hidden=false}
      function generatePlanForSelectedClient(){const c=getClientById(selectedClientId);if(c)renderPlan(c)}
      function copyPlanText(){if(planOutput.hidden)return;navigator.clipboard.writeText(planOutput.innerText.trim());copyPlanBtn.textContent="已复制";setTimeout(()=>copyPlanBtn.textContent="复制方案",1400)}
      initDate();paymentYear.addEventListener("change",updatePaymentDays);paymentMonth.addEventListener("change",updatePaymentDays);paymentDay.addEventListener("change",syncPaymentDateField);document.querySelector("#generatePlanBtn").addEventListener("click",generatePlanForSelectedClient);document.querySelector("#editClientBtn").addEventListener("click",editSelectedClient);document.querySelector("#deleteClientBtn").addEventListener("click",deleteSelectedClient);document.querySelector("#backToLibraryBtn").addEventListener("click",()=>setActiveView("library"));copyPlanBtn.addEventListener("click",copyPlanText);clientSearchInput.addEventListener("input",renderClientLibrary);clientList.addEventListener("click",e=>{const card=e.target.closest(".client-card");if(card)showClientDetail(card.dataset.clientId)});navButtons.forEach(b=>b.addEventListener("click",()=>{const target=b.dataset.targetView,current=document.querySelector(".app-view.is-active")?.dataset.view;if(target==="entry"&&current==="entry"){saveCurrentClient();return}if(target==="library")renderClientLibrary();setActiveView(target)}));renderClientLibrary();
    </script>
